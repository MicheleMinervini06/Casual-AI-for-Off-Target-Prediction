data:
  changeseq_features: data/processed/features/changeseq_features.parquet
  guideseq_features:  data/processed/features/guideseq_features.parquet
  train_split:        data/processed/splits/train.parquet
  val_split:          data/processed/splits/val.parquet
  test_split:         data/processed/splits/test.parquet
  vectors_changeseq:  data/logs/changeseq_vectors.h5
  vectors_guideseq:   data/logs/guideseq_vectors.h5

  # --- Filtro saturated pairs (Exp21+, vedi F22.1 / F23 in findings.md) ---
  # Una coppia positiva è "saturata" se `off_reads >= on_reads` per la stessa guide.
  # Tali coppie subiscono il cap di `reads_to_prob` (y_obs = 99%) e contribuiscono
  # al cluster Mode 2 di U_off su CHANGE-seq (90% dominato da LAG3_site_6).
  # Default `false` per backward compat con Exp15-Exp20.
  filter_saturated_changeseq: false
  raw_changeseq_csv:           data/raw/changeseq/CHANGEseq_positive.csv
  changeseq_reads_col:         CHANGEseq_reads

split:
  n_folds:     5
  test_fold:   4
  val_fold:    3
  random_seed: 42
  guide_col:   guide_name

features:
  feature_cols:
    - pam_score
    - node_B_proximal
    - node_C_seed_extension
    - node_D_non_seed
    - mismatch_count
    - mismatch_rate
    - gc_sgRNA
    - gc_offtarget
    - mean_energy_penalty
    - total_energy_penalty
    - profile_pos_01
    - profile_pos_02
    - profile_pos_03
    - profile_pos_04
    - profile_pos_05
    - profile_pos_06
    - profile_pos_07
    - profile_pos_08
    - profile_pos_09
    - profile_pos_10
    - profile_pos_11
    - profile_pos_12
    - profile_pos_13
    - profile_pos_14
    - profile_pos_15
    - profile_pos_16
    - profile_pos_17
    - profile_pos_18
    - profile_pos_19
    - profile_pos_20
    - concept_pam
    - concept_proximal_load
    - concept_seed_extension_load
    - concept_non_seed_load
    - concept_mismatch_rate
    - concept_energy
    - concept_gc_delta


evaluation:
  primary_metric:   auprc
  threshold_metric: f1
  store_curves:     true
  cross_assay:      true

logging:
  level:       INFO
  results_dir: experiments/results/
  save_model:  true
  save_shap:   true