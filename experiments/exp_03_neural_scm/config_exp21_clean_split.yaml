_base: experiments/configs/base.yaml

experiment:
  name: Exp21_CleanSplit_BestArch
  tags: ["positional_mlp", "pam_additive", "clean_split", "cross_assay_real"]
  notes: "Run 21: stessa architettura del best (Exp20: positional_mlp, additive PAM, biological_mismatch encoder, focal loss) ma su split CORRETTO. Split CHANGE-seq per-sgRNA (LPT bilanciato 80/10/10 sui positivi), GUIDE-seq usato come VERO cross-assay test (zero leakage di righe). Riferimento per il confronto con CCLMoff."

data:
  filter_saturated_changeseq: true

model:
  architecture: "positional_mlp"
  embed_dim: 16
  hidden_dim: 8
  encoder: biological_mismatch

  context_cols:
    - gc_sgRNA
    - gc_offtarget
    - concept_gc_delta

  pam_mode: additive
  positional_use_encoder: false
  variational: false

training:
  device: cuda
  learning_rate: 0.0001
  batch_size: 64
  epochs: 30
  patience: 99
  pos_weight_dynamic: false
  pos_weight: 5.0
  loss_type: focal
  focal_alpha: 0.25
  focal_gamma: 3.0
  lambda_causal: 0.01
  lambda_consist: 0.01
  pct_start: 0.15

  irm_enabled: false
  lambda_irm_max: 1.0
  irm_warmup_epochs: 5

phase3:
  fit_split: train
  evaluation_split: test
  max_fit_rows: null
  max_eval_rows: null

baseline:
  ccs_json: experiments/results/exp_02_scm/ccs_baseline.json

ccs:
  enabled: true
  mode: 6_rules
  max_guides: 200
  guide_source_split: test

output:
  model_pt: neural_scm.pt
  metrics_changeseq_train_json: metrics_changeseq_train.json
  metrics_changeseq_val_json: metrics_changeseq_val.json
  metrics_changeseq_json: metrics_changeseq.json
  metrics_guideseq_json: metrics_guideseq.json
  ccs_neural_json: ccs_neural.json
  ccs_comparison_json: ccs_comparison.json

tracking:
  enabled: true
